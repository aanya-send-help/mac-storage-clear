name: Bug report
description: Something is broken or behaves incorrectly
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: build
    attributes:
      label: Build flavor
      description: App Store or direct (dev-ID) build?
      placeholder: "App Store v0.1.2 / Direct v0.1.3"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.6 (Sonoma)"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: From `~/Library/Logs/mac-storage-clear/` if available
      render: shell
